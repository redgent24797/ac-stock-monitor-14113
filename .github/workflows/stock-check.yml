name: AC Stock Check

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 minutes (GitHub may add a few minutes' delay)
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write             # needed to commit state.json back to the repo

concurrency:
  group: stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run stock check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python check_stock.py

      - name: Save state
        run: |
          git config user.name "stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update stock state [skip ci]"
          git push
